<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stackly | Preloader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* ==========================================================
       1. ROOT CONSTANTS & BASICS
       ========================================================== */
    :root {
      --bg-color: #12100e; /* Deep rich dark brown/black */
      --grid-color: rgba(197, 168, 128, 0.04); /* Subtle gold gridlines */
      --accent-gold: #c5a47e; /* Premium gold */
      --accent-gold-glow: rgba(197, 168, 128, 0.3);
      --text-color: #fafaf9;
      --text-muted: #8e847c;
      --font-family: 'Plus Jakarta Sans', sans-serif;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: var(--font-family);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Technical Drafting Grid Background */
    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: 
        linear-gradient(var(--grid-color) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
      background-size: 30px 30px;
      z-index: 1;
      pointer-events: none;
    }

    /* Subtle Blueprint Radial Gradient */
    body::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%; width: 100%; height: 100%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle at center, rgba(30, 26, 23, 0.8) 0%, var(--bg-color) 70%);
      z-index: 2;
      pointer-events: none;
    }

    /* ==========================================================
       2. MAIN ANIMATION STAGE (3D STACKING BLOCKS)
       ========================================================== */
    .animation-stage {
      position: relative;
      width: 300px;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
    }

    /* Isometric Stacking Cubes Container */
    .cubes-container {
      position: absolute;
      width: 120px;
      height: 120px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotateX(60deg) rotateZ(45deg);
      transform-style: preserve-3d;
      animation: fadeOutCubes 0.8s ease forwards;
      animation-delay: 2.0s;
    }

    /* Individual isometric blocks fly in and stack */
    .block {
      position: absolute;
      width: 80px;
      height: 80px;
      transform-style: preserve-3d;
      opacity: 0;
    }

    /* Block 1 (Comes from top-left) */
    .block-1 {
      left: 20px;
      top: 20px;
      transform: translate3d(-150px, -150px, 0);
      animation: floatInBlock1 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      animation-delay: 0.2s;
    }

    @keyframes floatInBlock1 {
      0% {
        opacity: 0;
        transform: translate3d(-150px, -150px, 0);
      }
      100% {
        opacity: 1;
        transform: translate3d(0, 0, 0);
      }
    }

    /* Block 2 (Comes from bottom-right) */
    .block-2 {
      left: 20px;
      top: 20px;
      transform: translate3d(150px, 150px, 0);
      animation: floatInBlock2 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      animation-delay: 0.5s;
    }

    @keyframes floatInBlock2 {
      0% {
        opacity: 0;
        transform: translate3d(150px, 150px, 0);
      }
      100% {
        opacity: 1;
        transform: translate3d(0, 0, 30px);
      }
    }

    /* Block 3 (Comes from top depth) */
    .block-3 {
      left: 20px;
      top: 20px;
      transform: translate3d(0, 0, 300px);
      animation: floatInBlock3 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      animation-delay: 0.8s;
    }

    @keyframes floatInBlock3 {
      0% {
        opacity: 0;
        transform: translate3d(0, 0, 300px);
      }
      100% {
        opacity: 1;
        transform: translate3d(0, 0, 60px);
      }
    }

    @keyframes fadeOutCubes {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) rotateX(60deg) rotateZ(45deg) scale(1);
      }
      80% {
        opacity: 0.3;
        transform: translate(-50%, -50%) rotateX(60deg) rotateZ(45deg) scale(1.05);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) rotateX(60deg) rotateZ(45deg) scale(0.6);
      }
    }

    /* Logo Overlay container */
    .logo-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.85);
      z-index: 10;
      opacity: 0;
      animation: revealLogo 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: 2.0s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .logo-glow-ring {
      position: relative;
      width: 130px;
      height: 130px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle, rgba(18, 16, 14, 0.9) 0%, transparent 80%);
    }

    /* Technical scanner ring rotating */
    .logo-glow-ring::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 1px dashed var(--accent-gold);
      opacity: 0.3;
      animation: rotateRing 8s linear infinite;
    }

    /* Inner solid scanner ring */
    .logo-glow-ring::after {
      content: '';
      position: absolute;
      width: 90%;
      height: 90%;
      border-radius: 50%;
      border: 1px solid rgba(197, 168, 128, 0.2);
      box-shadow: 0 0 20px var(--accent-gold-glow);
      animation: pulseRing 2s ease-in-out infinite alternate;
    }

    .preloader-logo {
      height: 48px;
      width: auto;
      object-fit: contain;
      z-index: 12;
      filter: drop-shadow(0 0 8px rgba(197, 168, 128, 0.5));
    }

    @keyframes rotateRing {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes revealLogo {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.7) rotate(-10deg);
      }
      100% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1) rotate(0deg);
      }
    }

    @keyframes pulseRing {
      0% {
        transform: scale(0.95);
        opacity: 0.5;
        box-shadow: 0 0 15px rgba(197, 168, 128, 0.2);
      }
      100% {
        transform: scale(1.05);
        opacity: 1;
        box-shadow: 0 0 35px rgba(197, 168, 128, 0.5);
      }
    }

    /* ==========================================================
       3. METRICS PANEL (PERCENTAGE & STATUS)
       ========================================================== */
    .metrics-panel {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      z-index: 5;
      text-align: center;
    }

    .status-text {
      font-size: 0.6875rem;
      font-weight: 600;
      color: var(--accent-gold);
      letter-spacing: 2px;
      text-transform: uppercase;
      height: 16px;
      transition: all 0.3s ease;
    }

    .progress-bar-wrap {
      width: 240px;
      height: 2px;
      background-color: rgba(142, 132, 124, 0.1);
      border-radius: 2px;
      position: relative;
      overflow: hidden;
    }

    .progress-bar-fill {
      width: 0%;
      height: 100%;
      background-color: var(--accent-gold);
      box-shadow: 0 0 6px var(--accent-gold);
      position: absolute;
      top: 0; left: 0;
      transition: width 0.05s linear;
    }

    .percentage {
      font-size: 1.5rem;
      font-weight: 300;
      letter-spacing: 1px;
      color: var(--text-color);
    }

    /* ==========================================================
       4. ACTIONS mechanics
       ========================================================== */
    .skip-btn {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: none;
      border: 1px solid rgba(197, 168, 128, 0.2);
      border-radius: 4px;
      color: var(--text-muted);
      padding: 8px 16px;
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      z-index: 5;
      transition: all 0.3s ease;
    }

    .skip-btn:hover {
      border-color: var(--accent-gold);
      color: var(--text-color);
      box-shadow: 0 0 10px rgba(197, 168, 128, 0.1);
    }

    /* 3D block faces styling */
    .face {
      position: absolute;
      width: 80px;
      height: 80px;
      background: var(--accent-gold);
      border: 1px solid rgba(18, 16, 14, 0.6);
    }

    .face-top {
      transform: rotateX(90deg) translateZ(40px);
      background: #dfc8ae;
    }

    .face-front {
      transform: rotateY(0deg) translateZ(40px);
      background: #c5a47e;
    }

    .face-right {
      transform: rotateY(90deg) translateZ(40px);
      background: #a3815c;
    }
  </style>
</head>
<body>

  <!-- Animation Stage -->
  <div class="animation-stage">
    
    <!-- 3D Stacking Cubes -->
    <div class="cubes-container">
      
      <!-- Block 1 -->
      <div class="block block-1">
        <div class="face face-top"></div>
        <div class="face face-front"></div>
        <div class="face face-right"></div>
      </div>
      
      <!-- Block 2 -->
      <div class="block block-2">
        <div class="face face-top"></div>
        <div class="face face-front"></div>
        <div class="face face-right"></div>
      </div>
      
      <!-- Block 3 -->
      <div class="block block-3">
        <div class="face face-top"></div>
        <div class="face face-front"></div>
        <div class="face face-right"></div>
      </div>
      
    </div>

    <!-- Final Logo Reveal overlay -->
    <div class="logo-container">
      <div class="logo-glow-ring">
        <img src="./assets/images/logo.webp" alt="Stackly Logo" class="preloader-logo">
      </div>
    </div>

  </div>

  <!-- Loading Metrics -->
  <div class="metrics-panel">
    <div class="percentage" id="loaderPct">0%</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="loaderFill"></div>
    </div>
    <div class="status-text" id="loaderStatus">Initializing Blueprint Parser...</div>
  </div>

  <!-- Skip Intro Action -->
  <button class="skip-btn" id="skipLoader">Skip Intro</button>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const loaderPct = document.getElementById("loaderPct");
      const loaderFill = document.getElementById("loaderFill");
      const loaderStatus = document.getElementById("loaderStatus");
      const skipBtn = document.getElementById("skipLoader");

      const statusMessages = [
        { limit: 15, msg: "Initializing Blueprint Parser..." },
        { limit: 35, msg: "Establishing Spatial Anchors..." },
        { limit: 55, msg: "Computing Acoustic Coefficients..." },
        { limit: 75, msg: "Placing Custom Furniture Nodes..." },
        { limit: 95, msg: "Routing Lighting Loop Blueprints..." },
        { limit: 100, msg: "Stackly Workspace Curation Complete." }
      ];

      let count = 0;
      const duration = 3500; // 3.5 seconds
      const intervalTime = 30; // ms per step
      const totalSteps = duration / intervalTime;
      const stepIncrement = 100 / totalSteps;

      const timer = setInterval(() => {
        count += stepIncrement;
        if (count >= 100) {
          count = 100;
          clearInterval(timer);
          // Redirect to index.html after completion
          setTimeout(redirect, 500);
        }

        const pct = Math.floor(count);
        loaderPct.textContent = pct + "%";
        loaderFill.style.width = pct + "%";

        // Update status text dynamically
        const currentStatus = statusMessages.find(m => pct <= m.limit);
        if (currentStatus) {
          loaderStatus.textContent = currentStatus.msg;
        }
      }, intervalTime);

      function redirect() {
        window.location.href = "index.html";
      }

      // Skip action
      skipBtn.addEventListener("click", () => {
        clearInterval(timer);
        redirect();
      });
    });
  </script>

</body>
</html>
